<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found – CloudZentra</title>
  <meta name="robots" content="noindex"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .notfound {
      min-height: 100vh;
      background: var(--gradient);
      display: flex; align-items: center; justify-content: center;
      text-align: center; color: #fff; padding: 40px 24px;
    }
    .notfound-inner { max-width: 520px; }
    .notfound h1 { font-size: 7rem; font-weight: 800; line-height: 1; margin-bottom: 8px; opacity: 0.9; }
    .notfound h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 16px; }
    .notfound p  { font-size: 1rem; opacity: 0.85; margin-bottom: 36px; }
    .notfound-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="notfound">
    <div class="notfound-inner">
      <div style="font-size:4rem;margin-bottom:16px;">&#9729;&#65039;</div>
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <div class="notfound-btns">
        <a href="index.html" class="btn-primary">&#8592; Back to Home</a>
        <a href="index.html#contact" class="btn-outline">Contact Us</a>
      </div>
    </div>
  </div>
</body>
</html>
